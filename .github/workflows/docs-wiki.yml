name: GitHub Wiki Documentation

on:
  workflow_call:
    inputs:
      diagrams_path:
        description: "Path glob pattern for diagram images to trigger on"
        required: false
        type: string
        default: "Graphol/diagrams/**"
      docs_dir:
        description: "Output directory for generated docs"
        required: false
        type: string
        default: "docs/from-wiki"
    secrets:
      GH_TOKEN:
        required: false

  workflow_dispatch:
    inputs:
      diagrams_path:
        description: "Path glob pattern for diagram images to trigger on"
        required: false
        type: string
        default: "Graphol/diagrams/**"
      docs_dir:
        description: "Output directory for generated docs"
        required: false
        type: string
        default: "docs/from-wiki"

permissions:
  contents: write

concurrency:
  group: docs-wiki-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          path: calling-repo
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout wiki repo
        run: |
          set -e

          if [ -n "${{ secrets.GH_TOKEN }}" ]; then
            echo "Using authenticated access for wiki"
            git clone "https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null || \
            git clone "https://github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null || {
              echo "::warning::Wiki repository not found or not accessible."
              echo "The wiki may not be initialized yet, or it may be private and require a GH_TOKEN secret."
              echo "To fix this:"
              echo "1. Ensure the wiki is enabled in repository settings"
              echo "2. Create at least one wiki page"
              echo "3. For private repos, add a GH_TOKEN secret with repo scope"
              mkdir -p wiki
              {
                echo "# No Wiki Content"
                echo
                echo "The wiki repository could not be accessed. Please initialize the wiki first."
              } > wiki/Home.md
            }
          else
            echo "Attempting public wiki access"
            git clone "https://github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null || {
              echo "::warning::Wiki repository not found or not accessible."
              echo "The wiki may not be initialized yet."
              echo "To fix this:"
              echo "1. Ensure the wiki is enabled in repository settings"
              echo "2. Create at least one wiki page"
              echo "3. For private repos, add a GH_TOKEN secret with repo scope"
              mkdir -p wiki
              {
                echo "# No Wiki Content"
                echo
                echo "The wiki repository could not be accessed. Please initialize the wiki first."
              } > wiki/Home.md
            }
          fi

      - name: Checkout OntoQA for script
        uses: actions/checkout@v4
        with:
          repository: Airy59/OntoQA
          path: ontoqa
          sparse-checkout: |
            scripts/docs-wiki.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate timestamp for version info
        id: timestamp
        run: |
          DATETIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "datetime=${DATETIME}" >> "$GITHUB_OUTPUT"

      - name: Generate wiki documentation
        run: |
          set -e

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          DATETIME="${{ steps.timestamp.outputs.datetime }}"
          DOCS_DIR="${{ inputs.docs_dir || 'docs/from-wiki' }}"

          mkdir -p "calling-repo/${DOCS_DIR}"
          rm -rf "calling-repo/${DOCS_DIR}/images"
          mkdir -p "calling-repo/${DOCS_DIR}/images"

          echo "Generating version with embedded images..."
          python ontoqa/scripts/docs-wiki.py \
            --wiki-dir wiki \
            --out "calling-repo/${DOCS_DIR}/${REPO_NAME}.md" \
            --repo "${{ github.repository }}" \
            --embed-images \
            --timestamp "${DATETIME}"

          echo "Generating version with image subfolder..."
          python ontoqa/scripts/docs-wiki.py \
            --wiki-dir wiki \
            --out "calling-repo/${DOCS_DIR}/${REPO_NAME}.md" \
            --repo "${{ github.repository }}" \
            --timestamp "${DATETIME}"

          echo "Generated markdown files:"
          ls -lh "calling-repo/${DOCS_DIR}/"*.md 2>/dev/null || true

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-extra

      - name: Generate PDF and LaTeX
        run: |
          set -e

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          DOCS_DIR="${{ inputs.docs_dir || 'docs/from-wiki' }}"
          cd "calling-repo/${DOCS_DIR}"

          if [ -f "${REPO_NAME}_with_subfolder.md" ]; then
            SOURCE_MD="${REPO_NAME}_with_subfolder.md"
          elif [ -f "${REPO_NAME}.md" ]; then
            SOURCE_MD="${REPO_NAME}.md"
          else
            echo "::error::No markdown source file found for PDF/LaTeX generation."
            ls -la
            exit 1
          fi

          echo "Using source markdown: ${SOURCE_MD}"

          echo "Generating PDF..."
          pandoc "${SOURCE_MD}" \
            -o "${REPO_NAME}.pdf" \
            --pdf-engine=xelatex \
            --toc \
            --number-sections \
            --metadata title="${REPO_NAME} Wiki Documentation" \
            --from markdown-yaml_metadata_block+pipe_tables-simple_tables-multiline_tables-grid_tables \
            --resource-path=.:images \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable documentclass=article \
            --variable linestretch=1.2 \
            --variable linkcolor=blue \
            --variable urlcolor=blue \
            || echo "PDF generation had warnings but may have succeeded"

          echo "Generating LaTeX..."
          pandoc "${SOURCE_MD}" \
            -o "${REPO_NAME}.tex" \
            --standalone \
            --toc \
            --number-sections \
            --metadata title="${REPO_NAME} Wiki Documentation" \
            --from markdown-yaml_metadata_block+pipe_tables-simple_tables-multiline_tables-grid_tables \
            --resource-path=.:images \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable documentclass=article \
            --variable linestretch=1.2 \
            --variable linkcolor=blue \
            --variable urlcolor=blue

          cd ../..
          echo "Generated files:"
          ls -lh "calling-repo/${DOCS_DIR}"/*.pdf "calling-repo/${DOCS_DIR}"/*.tex 2>/dev/null || true

      - name: Commit & push changes
        run: |
          set -e

          DATETIME="${{ steps.timestamp.outputs.datetime }}"
          DOCS_DIR="${{ inputs.docs_dir || 'docs/from-wiki' }}"
          TARGET_BRANCH="${{ github.ref_name }}"

          cd calling-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

          echo "Current branch: ${TARGET_BRANCH}"
          echo "Repository status before staging:"
          git status --short || true

          git add "${DOCS_DIR}"/*.md 2>/dev/null || true
          git add "${DOCS_DIR}"/*.pdf 2>/dev/null || true
          git add "${DOCS_DIR}"/*.tex 2>/dev/null || true
          git add "${DOCS_DIR}/images/" 2>/dev/null || true

          echo "Repository status after staging:"
          git status --short || true

          if ! git diff --cached --quiet; then
            git commit -m "Update wiki documentation [${DATETIME}]"

            MAX_RETRIES=5
            RETRY_COUNT=0
            PUSH_SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              ATTEMPT=$((RETRY_COUNT + 1))
              echo "Attempt ${ATTEMPT}/${MAX_RETRIES}: syncing with origin/${TARGET_BRANCH}"

              if git pull --rebase origin "${TARGET_BRANCH}"; then
                echo "Rebase successful, pushing..."
                if git push origin "HEAD:${TARGET_BRANCH}"; then
                  echo "Push successful."
                  PUSH_SUCCESS=true
                  break
                else
                  echo "Push failed."
                fi
              else
                echo "Pull --rebase failed."
              fi

              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep $((2 ** RETRY_COUNT))
            done

            if [ "${PUSH_SUCCESS}" != "true" ]; then
              echo "::error::Failed to push documentation after ${MAX_RETRIES} attempts."
              exit 1
            fi
          else
            echo "No changes to commit"
          fi
